name: Publish VS Code extension and marketplaces

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install publishing tools
        run: |
          npm install -g @vscode/vsce ovsx

      - name: Package extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          vsce package -o "human-language-${VERSION}.vsix"

      - name: Publish to OpenVSX
        if: ${{ secrets.OPENVSX_TOKEN != '' }}
        env:
          OPENVSX_TOKEN: ${{ secrets.OPENVSX_TOKEN }}
        run: |
          npx ovsx publish "human-language-*.vsix" -p "$OPENVSX_TOKEN"

      - name: Prepare JetBrains Marketplace bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/jetbrains
          cp "human-language-${VERSION}.vsix" dist/jetbrains/
          zip -r "dist/jetbrains/human-language-${VERSION}.zip" "dist/jetbrains/human-language-${VERSION}.vsix"

      - name: Upload marketplace artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-artifacts
          path: |
            dist/jetbrains/*
            *.vsix