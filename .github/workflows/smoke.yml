name: Smoke CI

on:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-3.11-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-pip-
            ${{ runner.os }}-pip-
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run health check
        run: |
          python scripts/health_check.py
      - name: Validate py_import policy (strict)
        env:
          HUMAN_PY_IMPORT_ENABLED: '1'
        run: |
          python scripts/validate_import_policy.py
      - name: Run pytest (smoke)
        run: |
          python -m pytest tests -q